<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bolão 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:       #0C0C0C;
  --s1:       #141414;
  --s2:       #1C1C1C;
  --s3:       #252525;
  --border:   #252525;
  --border2:  #1E1E1E;
  --text:     #F2F2F2;
  --text-2:   #888;
  --text-3:   #444;
  --yellow:   #F0C040;
  --yellow-bg:rgba(240,192,64,.08);
  --red:      #E53935;
  --red-bg:   rgba(229,57,53,.08);
  --green:    #22C55E;
  --green-bg: rgba(34,197,94,.08);
  --blue:     #60A5FA;
  --r:        8px;
  --r-sm:     4px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}
input,button,select{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* ── SCREENS ─────────────────────────────────────────────────── */
.screen{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;background:var(--bg)}
.screen.off{display:none}

/* ── LOGIN ───────────────────────────────────────────────────── */
#s-login{justify-content:flex-end}
.login-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;pointer-events:none}
.login-year{font-family:'Bebas Neue',sans-serif;font-size:clamp(160px,52vw,240px);line-height:.88;color:transparent;
  -webkit-text-stroke:1px #282828;letter-spacing:-4px;user-select:none;white-space:nowrap;
  animation:yearDrift 12s ease-in-out infinite alternate}
@keyframes yearDrift{from{transform:translateX(-12px)}to{transform:translateX(12px)}}
.login-form{position:relative;z-index:2;padding:24px 20px 40px;background:linear-gradient(to top,var(--bg) 70%,transparent);width:100%}
.login-label{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase;margin-bottom:10px}
.login-wordmark{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text-3);margin-bottom:28px;letter-spacing:.02em}
.login-input{width:100%;padding:14px 16px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-size:16px;outline:none;transition:border-color .15s;letter-spacing:.01em}
.login-input:focus{border-color:var(--yellow)}
.login-input::placeholder{color:var(--text-3)}
.recents-row{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 20px}
.recent-chip{padding:6px 12px;background:var(--s2);border:1px solid var(--border);border-radius:20px;
  font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all .12s}
.recent-chip:active{background:var(--s3);color:var(--text)}
.login-btn{width:100%;padding:15px;background:var(--yellow);border:none;border-radius:var(--r);
  color:#0C0C0C;font-size:15px;font-weight:700;letter-spacing:.02em;cursor:pointer;transition:opacity .12s}
.login-btn:active{opacity:.85}

/* ── APP SHELL ───────────────────────────────────────────────── */
#s-app{display:none;flex-direction:column}
.topbar{background:var(--s1);border-bottom:1px solid var(--border2);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-mark{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.topbar-mark em{color:var(--yellow);font-style:normal}
.user-btn{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 10px 6px 6px;
  background:var(--s2);border:1px solid var(--border);border-radius:20px;transition:border-color .12s}
.user-btn:active{border-color:var(--yellow)}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--yellow);display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#0C0C0C;flex-shrink:0}
.user-nm{font-size:12px;font-weight:500;color:var(--text-2)}

/* ── BOTTOM NAV ──────────────────────────────────────────────── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border2);
  display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:50}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px 8px;gap:4px;cursor:pointer;position:relative}
.bni svg{width:20px;height:20px;stroke:var(--text-3);transition:stroke .15s;flex-shrink:0}
.bni span{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:.04em;transition:color .15s;text-transform:uppercase}
.bni.on svg{stroke:var(--yellow)}
.bni.on span{color:var(--yellow)}
.live-pip{position:absolute;top:8px;right:calc(50% - 16px);width:5px;height:5px;border-radius:50%;
  background:var(--red);border:1.5px solid var(--s1);display:none;animation:pip 1.4s ease infinite}
@keyframes pip{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.6)}}

/* ── SCROLL AREA ─────────────────────────────────────────────── */
.scroll{flex:1;overflow-y:auto;padding:14px 14px 80px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.pane{display:none}
.pane.on{display:block;animation:up .2s ease both}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION LABEL ───────────────────────────────────────────── */
.slabel{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text-3);text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:6px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pip 1.4s ease infinite;flex-shrink:0}

/* ── FILTER TABS ─────────────────────────────────────────────── */
.ftabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ftab{flex:1;padding:9px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--text-3);
  cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.06em;background:transparent;border:none}
.ftab.on{background:var(--s2);color:var(--text)}
.ftab+.ftab{border-left:1px solid var(--border)}

/* ── MATCH CARD ──────────────────────────────────────────────── */
.mc{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.mc.live{border-color:rgba(229,57,53,.25)}
.mc.done{border-color:rgba(240,192,64,.15)}
.mc-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 0}
.mc-group{font-size:11px;font-weight:500;color:var(--text-3)}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--r-sm);letter-spacing:.05em;display:inline-flex;align-items:center;gap:4px}
.b-live{color:var(--red);background:var(--red-bg)}
.b-ht{color:#F59E0B;background:rgba(245,158,11,.08)}
.b-ft{color:var(--yellow);background:var(--yellow-bg)}
.b-up{color:var(--blue);background:rgba(96,165,250,.08)}
.b-lock{color:var(--text-3);background:var(--s2)}

/* scoreboard */
.mc-body{display:flex;align-items:center;padding:12px 12px 14px;gap:0}
.team{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.team-flag{font-size:34px;line-height:1}
.team-name{font-size:11px;font-weight:600;color:var(--text-2);letter-spacing:.02em;text-align:center}
.score-col{min-width:84px;text-align:center;flex-shrink:0}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:6px;line-height:1;color:var(--text)}
.score-num .sep{color:var(--text-3);letter-spacing:0;margin:0 2px}
.score-min{font-size:11px;font-weight:700;color:var(--red);margin-top:1px}
.score-time{font-size:13px;font-weight:600;color:var(--text-3)}

/* guess zone */
.mc-guess{border-top:1px solid var(--border2);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.g-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em}
.ginputs{display:flex;align-items:center;gap:5px}
.g-in{width:38px;height:34px;text-align:center;font-size:17px;font-weight:700;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);outline:none;transition:border-color .12s}
.g-in:focus{border-color:var(--yellow)}
.g-in:disabled{opacity:.25;cursor:not-allowed}
.g-sep{font-size:13px;font-weight:700;color:var(--text-3)}
.g-btn{padding:7px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--text-2);font-size:11px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:all .12s;text-transform:uppercase}
.g-btn:active{transform:scale(.97)}
.g-btn.ok{border-color:rgba(34,197,94,.3);color:var(--green);background:var(--green-bg)}
.lock-msg{font-size:11px;color:var(--text-3);letter-spacing:.02em}

/* result tags */
.rtag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:var(--r-sm);letter-spacing:.05em}
.rt-3{color:var(--green);background:var(--green-bg)}
.rt-1{color:var(--blue);background:rgba(96,165,250,.08)}
.rt-0{color:var(--text-3);background:var(--s2)}
.rt-p{color:var(--yellow);background:var(--yellow-bg)}
.guess-show{display:flex;align-items:center;gap:8px}
.guess-show strong{font-size:13px;font-weight:700;color:var(--text)}

/* ── RANKING ─────────────────────────────────────────────────── */
.my-rank-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:14px;display:flex;align-items:stretch;gap:0;overflow:hidden}
.mrc-pos{display:flex;flex-direction:column;justify-content:center;padding-right:16px;border-right:1px solid var(--border)}
.mrc-pos-num{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--text);line-height:1}
.mrc-pos-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase}
.mrc-pts{display:flex;flex-direction:column;justify-content:center;padding:0 16px;border-right:1px solid var(--border)}
.mrc-pts-num{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--yellow);line-height:1}
.mrc-pts-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase}
.mrc-detail{flex:1;display:flex;flex-direction:column;justify-content:center;padding-left:14px;gap:6px}
.mrc-detail-line{font-size:12px;color:var(--text-2)}
.mrc-detail-line strong{color:var(--text);font-weight:700}

.rank-table{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.rr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border2)}
.rr:last-child{border-bottom:none}
.rr.me{background:rgba(240,192,64,.04)}
.rr-pos{font-family:'Bebas Neue',sans-serif;font-size:22px;min-width:28px;text-align:center;color:var(--text-3)}
.rr-pos.p1{color:var(--yellow)}
.rr-pos.p2{color:#B0B7C3}
.rr-pos.p3{color:#C4875A}
.rr-av{width:30px;height:30px;border-radius:50%;background:var(--s3);display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:var(--text-2);flex-shrink:0}
.rr.me .rr-av{background:rgba(240,192,64,.15);color:var(--yellow)}
.rr-info{flex:1;min-width:0}
.rr-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-sub{font-size:11px;color:var(--text-3);margin-top:1px}
.rr-pts{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--yellow);line-height:1}
.rr-pts-u{font-size:10px;font-weight:600;color:var(--text-3);font-family:'Space Grotesk',sans-serif}

/* ── AO VIVO ─────────────────────────────────────────────────── */
.live-card{background:var(--s1);border:1px solid rgba(229,57,53,.2);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.live-accent{height:1px;background:linear-gradient(90deg,transparent,var(--red) 50%,transparent)}
.live-score-area{padding:24px 16px 16px;text-align:center}
.live-phase{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--red);text-transform:uppercase;margin-bottom:6px}
.live-score{font-family:'Bebas Neue',sans-serif;font-size:88px;letter-spacing:10px;line-height:1;color:var(--text)}
.live-score .s{color:var(--text-3);letter-spacing:0}
.live-teams{display:flex;justify-content:space-between;padding:0 16px 16px;font-size:13px;font-weight:600;color:var(--text-2)}
.ai-row{border-top:1px solid var(--border2);padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.ai-label{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase;
  white-space:nowrap;padding-top:1px}
.ai-text{font-size:12px;color:var(--text-2);line-height:1.6;flex:1;min-height:32px}
.ai-btn{font-size:10px;font-weight:700;color:var(--text-3);background:transparent;border:1px solid var(--border);
  border-radius:var(--r-sm);padding:3px 8px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}

.bets-table{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.bt-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border2)}
.bt-row:last-child{border-bottom:none}
.bt-av{width:28px;height:28px;border-radius:50%;background:var(--s3);display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:var(--text-2);flex-shrink:0}
.bt-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.bt-score{font-size:13px;font-weight:700;color:var(--text-2)}

.empty-state{padding:56px 20px;text-align:center;color:var(--text-3)}
.empty-state svg{margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.empty-state p{font-size:13px;font-weight:500;letter-spacing:.02em}

/* ── ADMIN ───────────────────────────────────────────────────── */
.adm-card{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-bottom:8px}
.adm-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid var(--border2)}
.adm-row:last-child{border-bottom:none}
.adm-lbl{font-size:12px;font-weight:500;color:var(--text-2);flex:1;min-width:80px}
.a-in{width:38px;height:28px;text-align:center;font-size:13px;font-weight:700;background:var(--s2);
  border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);outline:none}
.a-sep{font-size:12px;color:var(--text-3)}
.a-sel{font-size:11px;padding:4px 6px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);outline:none}
.a-save{font-size:11px;font-weight:700;padding:5px 11px;background:transparent;border:1px solid var(--border);
  border-radius:var(--r-sm);color:var(--text-2);cursor:pointer;letter-spacing:.06em;text-transform:uppercase}
.a-save:active{background:var(--s3)}

/* ── TOAST ───────────────────────────────────────────────────── */
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--s3);border:1px solid var(--border);border-radius:20px;
  padding:8px 16px;font-size:12px;font-weight:600;color:var(--text);
  white-space:nowrap;opacity:0;transition:all .2s;z-index:200;pointer-events:none;letter-spacing:.02em}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ═══════════════════════════════════════
     LOGIN
═══════════════════════════════════════ -->
<div id="s-login" class="screen">
  <div class="login-bg">
    <div class="login-year">2026</div>
  </div>
  <div class="login-form">
    <div class="login-wordmark">Bolão da Copa</div>
    <div class="login-sub">FIFA World Cup 2026 · USA · MEX · CAN</div>

    <div class="login-label">Seu nome</div>
    <input class="login-input" id="name-input" placeholder="Como você quer ser chamado..." maxlength="24" autocomplete="off" autocorrect="off" autocapitalize="words">

    <div id="recents-wrap" style="display:none">
      <div class="recents-row" id="recents-chips"></div>
    </div>

    <button class="login-btn" onclick="doLogin()">Entrar no bolão</button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     APP
═══════════════════════════════════════ -->
<div id="s-app" class="screen off">
  <div class="topbar">
    <div class="topbar-mark">BOLÃO <em>2026</em></div>
    <div class="user-btn" onclick="logout()">
      <div class="user-av" id="top-av">?</div>
      <span class="user-nm" id="top-nm">—</span>
    </div>
  </div>

  <div class="scroll">
    <div class="pane on" id="p-jogos"></div>
    <div class="pane"    id="p-ranking"></div>
    <div class="pane"    id="p-live"></div>
    <div class="pane"    id="p-admin"></div>
  </div>

  <nav class="bnav">
    <div class="bni on" id="bn-jogos" onclick="goTab('jogos',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>Jogos</span>
    </div>
    <div class="bni" id="bn-ranking" onclick="goTab('ranking',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 20V10M12 20V4M6 20v-6"/>
      </svg>
      <span>Ranking</span>
    </div>
    <div class="bni" id="bn-live" onclick="goTab('live',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M20.2 7.8a9 9 0 0 1 0 8.4M3.8 7.8a9 9 0 0 0 0 8.4M17 4.9a13 13 0 0 1 0 14.2M7 4.9a13 13 0 0 0 0 14.2"/>
      </svg>
      <span>Ao Vivo</span>
      <div class="live-pip" id="live-pip"></div>
    </div>
    <div class="bni" id="bn-admin" onclick="goTab('admin',this)" style="display:none">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      <span>Admin</span>
    </div>
  </nav>
</div>

<script>
// ── DATA ───────────────────────────────────────────────────────
const LOCK_MINS = 5;
let MATCHES = [
  {id:1,home:"Brasil",    hf:"🇧🇷",away:"Argentina",   af:"🇦🇷",group:"Semifinal",
   kickoff:Date.now()-38*60000,    status:"live",     minute:38,score:{h:1,a:1},phase:"2H"},
  {id:2,home:"França",    hf:"🇫🇷",away:"Alemanha",    af:"🇩🇪",group:"Grupo A",
   kickoff:Date.now()+6*60000,     status:"upcoming", minute:0, score:{h:null,a:null},phase:"PRE"},
  {id:3,home:"Espanha",   hf:"🇪🇸",away:"Portugal",   af:"🇵🇹",group:"Grupo B",
   kickoff:Date.now()+3.5*3600000, status:"upcoming", minute:0, score:{h:null,a:null},phase:"PRE"},
  {id:4,home:"Japão",     hf:"🇯🇵",away:"Coreia do Sul",af:"🇰🇷",group:"Grupo C",
   kickoff:Date.now()-110*60000,   status:"finished", minute:90,score:{h:2,a:0},phase:"FT"},
];
let S={user:null,isAdmin:false,guesses:{},reactions:{1:[],2:[],3:[],4:[]}};

// ── UTILS ───────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const ini=n=>n?n.slice(0,2).toUpperCase():"?";
function locked(m){
  if(m.status==="live"||m.status==="finished")return true;
  return(m.kickoff-Date.now())<LOCK_MINS*60000;
}
function pts(g,m){
  if(!g||m.score.h===null)return null;
  if(g.h===m.score.h&&g.a===m.score.a)return 3;
  const gw=g.h>g.a?"H":g.h<g.a?"A":"D";
  const mw=m.score.h>m.score.a?"H":m.score.h<m.score.a?"A":"D";
  return gw===mw?1:0;
}
const hhmm=ts=>new Date(ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
const ddmm=ts=>new Date(ts).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});

// ── RECENTS ────────────────────────────────────────────────────
const getR=()=>{try{return JSON.parse(localStorage.getItem("b26r")||"[]")}catch{return[]}};
function addR(n){let r=getR().filter(x=>x!==n);r.unshift(n);r=r.slice(0,4);try{localStorage.setItem("b26r",JSON.stringify(r))}catch{}}
function buildRecents(){
  const r=getR(),wrap=$("recents-wrap"),chips=$("recents-chips");
  if(!r.length){wrap.style.display="none";return}
  wrap.style.display="";
  chips.innerHTML=r.map(n=>`<div class="recent-chip" onclick="$('name-input').value='${n.replace(/'/g,"\\'")}'">${n}</div>`).join("");
}
buildRecents();
$("name-input").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});

// ── LOGIN ───────────────────────────────────────────────────────
function doLogin(){
  const name=$("name-input").value.trim();
  if(!name)return;
  S.user=name; S.isAdmin=name.toLowerCase()==="admin";
  addR(name);
  $("top-av").textContent=ini(name);
  $("top-nm").textContent=name;
  if(S.isAdmin)$("bn-admin").style.display="";
  if(MATCHES.some(m=>m.status==="live"))$("live-pip").style.display="block";
  $("s-login").classList.add("off");
  $("s-app").classList.remove("off");
  $("s-app").style.display="flex";
  renderJogos(); renderRanking(); renderLive();
}
function logout(){
  $("s-app").style.display="none";
  $("s-app").classList.add("off");
  $("s-login").classList.remove("off");
  $("name-input").value="";
  buildRecents();
  S.user=null;
  // reset tabs
  document.querySelectorAll(".bni").forEach(b=>b.classList.remove("on"));
  $("bn-jogos").classList.add("on");
  document.querySelectorAll(".pane").forEach(p=>p.classList.remove("on"));
  $("p-jogos").classList.add("on");
}

// ── TABS ───────────────────────────────────────────────────────
function goTab(id,el){
  document.querySelectorAll(".bni").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
  document.querySelectorAll(".pane").forEach(p=>p.classList.remove("on"));
  const pane=$("p-"+id);
  pane.classList.add("on");
  if(id==="ranking")renderRanking();
  if(id==="live")renderLive();
  if(id==="admin")renderAdmin();
}

// ── JOGOS ───────────────────────────────────────────────────────
let filter="hoje";
function renderJogos(){
  const live=MATCHES.filter(m=>m.status==="live");
  const up=MATCHES.filter(m=>m.status==="upcoming");
  const fin=MATCHES.filter(m=>m.status==="finished");

  let h=`<div class="ftabs">
    <button class="ftab${filter==="anteriores"?" on":""}" onclick="setF('anteriores')">Anteriores</button>
    <button class="ftab${filter==="hoje"?" on":""}" onclick="setF('hoje')">Hoje</button>
    <button class="ftab${filter==="proximos"?" on":""}" onclick="setF('proximos')">Próximos</button>
  </div>`;

  // live always at top regardless of filter
  if(live.length){
    h+=`<div class="slabel"><span class="live-dot"></span>Ao vivo agora</div>`;
    live.forEach(m=>h+=card(m));
  }

  let show=[];
  if(filter==="anteriores")show=fin;
  else if(filter==="proximos")show=up;
  else show=[...up,...fin]; // hoje: live already shown above

  // group by date
  if(show.length){
    const today=ddmm(Date.now());
    const groups={};
    show.forEach(m=>{const d=ddmm(m.kickoff);if(!groups[d])groups[d]=[];groups[d].push(m)});
    Object.entries(groups).forEach(([d,ms])=>{
      const lbl=d===today?`Hoje · ${d}`:d;
      if(!live.length||filter!=="hoje")
        h+=`<div class="slabel" style="margin-top:${live.length?'16px':'0'}">${lbl}</div>`;
      ms.forEach(m=>h+=card(m));
    });
  }

  if(!live.length&&!show.length){
    h+=`<div class="empty-state"><p>Nenhum jogo nesse período</p></div>`;
  }

  $("p-jogos").innerHTML=`<div class="pane-inner" style="animation:up .2s ease both">${h}</div>`;
}
function setF(f){filter=f;renderJogos()}

function card(m){
  const lk=locked(m);
  const g=(S.guesses[S.user]||{})[m.id];
  const p=pts(g,m);
  const sh=m.score.h!==null?m.score.h:"–";
  const sa=m.score.a!==null?m.score.a:"–";

  // badge
  let badge="",cls="";
  if(m.phase==="HT"){badge=`<span class="badge b-ht">Intervalo</span>`;cls="live"}
  else if(m.phase==="FT"||m.status==="finished"){badge=`<span class="badge b-ft">Encerrado</span>`;cls="done"}
  else if(m.status==="live"){badge=`<span class="badge b-live"><span class="live-dot" style="width:4px;height:4px"></span>${m.minute}'</span>`;cls="live"}
  else if(lk){badge=`<span class="badge b-lock">Travado</span>`}
  else{badge=`<span class="badge b-up">${hhmm(m.kickoff)}</span>`}

  // scoreboard center
  let center="";
  if(m.status!=="upcoming"){
    center=`<div class="score-num">${sh}<span class="sep"> × </span>${sa}</div>
      ${m.status==="live"&&m.phase!=="HT"?`<div class="score-min">${m.minute}'</div>`:""}`;
  }else{
    center=`<div class="score-time">${hhmm(m.kickoff)}</div>`;
  }

  // guess zone
  let gz="";
  if(lk){
    if(g){
      const tc=p===3?"rt-3":p===1?"rt-1":p===0?"rt-0":"rt-p";
      const tt=p===3?"+3 pts":p===1?"+1 pt":p===0?"0 pts":"Aguardando";
      gz=`<div class="mc-guess">
        <span class="g-label">Palpite</span>
        <div class="guess-show"><strong>${g.h} × ${g.a}</strong></div>
        <span class="rtag ${tc}">${tt}</span>
      </div>`;
    }else{
      gz=`<div class="mc-guess"><span class="lock-msg">Palpites encerrados</span></div>`;
    }
  }else{
    gz=`<div class="mc-guess">
      <span class="g-label">Palpite</span>
      <div class="ginputs">
        <input class="g-in" id="g${m.id}h" type="number" min="0" max="20" value="${g?g.h:""}" placeholder="0">
        <span class="g-sep">×</span>
        <input class="g-in" id="g${m.id}a" type="number" min="0" max="20" value="${g?g.a:""}" placeholder="0">
      </div>
      <button class="g-btn${g?" ok":""}" id="gbtn${m.id}" onclick="saveG(${m.id})">${g?"Salvo":"Salvar"}</button>
    </div>`;
  }

  return`<div class="mc ${cls}">
    <div class="mc-head"><span class="mc-group">${m.group}</span>${badge}</div>
    <div class="mc-body">
      <div class="team"><span class="team-flag">${m.hf}</span><span class="team-name">${m.home}</span></div>
      <div class="score-col">${center}</div>
      <div class="team"><span class="team-flag">${m.af}</span><span class="team-name">${m.away}</span></div>
    </div>
    ${gz}
  </div>`;
}

function saveG(mid){
  const h=parseInt($(`g${mid}h`).value),a=parseInt($(`g${mid}a`).value);
  if(isNaN(h)||isNaN(a)||h<0||a<0)return;
  const m=MATCHES.find(x=>x.id===mid);
  if(locked(m))return;
  if(!S.guesses[S.user])S.guesses[S.user]={};
  S.guesses[S.user][mid]={h,a};
  const btn=$("gbtn"+mid);
  if(btn){btn.className="g-btn ok";btn.textContent="Salvo"}
  toast("Palpite salvo");
}

// ── RANKING ────────────────────────────────────────────────────
function allUsers(){
  const s=new Set(Object.keys(S.guesses));
  ["Ana","Carlos","Fernanda","Lucas","Maria","Pedro"].forEach(n=>s.add(n));
  if(S.user)s.add(S.user);
  return Array.from(s);
}
function total(u){
  let p=0,ex=0,win=0;
  MATCHES.forEach(m=>{const g=(S.guesses[u]||{})[m.id];const x=pts(g,m);if(x!==null){p+=x;if(x===3)ex++;else if(x===1)win++}});
  return{p,ex,win};
}
function renderRanking(){
  const users=allUsers();
  const ranked=users.map(u=>({n:u,...total(u)})).sort((a,b)=>b.p-a.p);
  const me=ranked.find(r=>r.n===S.user)||{p:0,ex:0,win:0};
  const myI=ranked.findIndex(r=>r.n===S.user)+1;
  const fin=MATCHES.filter(m=>m.status==="finished").length;

  let h=`<div class="my-rank-card">
    <div class="mrc-pos"><div class="mrc-pos-num">#${myI||"–"}</div><div class="mrc-pos-lbl">Posição</div></div>
    <div class="mrc-pts"><div class="mrc-pts-num">${me.p}</div><div class="mrc-pts-lbl">Pontos</div></div>
    <div class="mrc-detail">
      <div class="mrc-detail-line"><strong>${me.ex}</strong> placar${me.ex!==1?"es":""} exato${me.ex!==1?"s":""}</div>
      <div class="mrc-detail-line"><strong>${me.win}</strong> vencedor${me.win!==1?"es":""} certo${me.win!==1?"s":""}</div>
      <div class="mrc-detail-line"><strong>${fin}</strong> jogo${fin!==1?"s":""} encerrado${fin!==1?"s":""}</div>
    </div>
  </div>`;

  h+=`<div class="rank-table">`;
  ranked.forEach((r,i)=>{
    const posC=i===0?"p1":i===1?"p2":i===2?"p3":"";
    h+=`<div class="rr${r.n===S.user?" me":""}">
      <div class="rr-pos ${posC}">${i+1}</div>
      <div class="rr-av">${ini(r.n)}</div>
      <div class="rr-info">
        <div class="rr-name">${r.n}${r.n===S.user?` <span style="font-size:10px;color:var(--text-3)">você</span>`:""}</div>
        <div class="rr-sub">${r.ex} exato${r.ex!==1?"s":""} · ${r.win} vencedor${r.win!==1?"es":""}</div>
      </div>
      <div><div class="rr-pts">${r.p}</div><div class="rr-pts-u">pts</div></div>
    </div>`;
  });
  h+=`</div>`;
  $("p-ranking").innerHTML=`<div style="animation:up .2s ease both">${h}</div>`;
}

// ── AO VIVO ────────────────────────────────────────────────────
function renderLive(){
  const live=MATCHES.find(m=>m.status==="live");
  const fin=MATCHES.filter(m=>m.status==="finished");
  let h="";

  if(live){
    const phase=live.phase==="HT"?"Intervalo":live.phase==="FT"?"Encerrado":`${live.minute}' em andamento`;
    h+=`<div class="live-card">
      <div class="live-accent"></div>
      <div class="live-score-area">
        <div class="live-phase">${phase}</div>
        <div class="live-score">${live.score.h}<span class="s"> × </span>${live.score.a}</div>
      </div>
      <div class="live-teams">
        <span>${live.hf} ${live.home}</span>
        <span>${live.away} ${live.af}</span>
      </div>
      <div class="ai-row">
        <div class="ai-label">Análise</div>
        <div class="ai-text" id="ai-text">Carregando...</div>
        <button class="ai-btn" onclick="loadAI()">↺</button>
      </div>
    </div>`;

    // bets
    h+=`<div class="slabel" style="margin-bottom:10px">Palpites nesse jogo</div>`;
    h+=`<div class="bets-table" id="live-bets"></div>`;
  }else if(fin.length){
    const last=fin[fin.length-1];
    h+=`<div class="live-card" style="border-color:rgba(240,192,64,.2)">
      <div style="height:1px;background:linear-gradient(90deg,transparent,var(--yellow) 50%,transparent)"></div>
      <div class="live-score-area">
        <div style="font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase;margin-bottom:6px">Resultado final</div>
        <div class="live-score" style="color:var(--yellow)">${last.score.h}<span class="s" style="color:var(--text-3)"> × </span>${last.score.a}</div>
      </div>
      <div class="live-teams">${last.hf} ${last.home}&ensp;·&ensp;${last.away} ${last.af}</div>
    </div>`;
    fin.forEach(m=>{
      h+=`<div class="slabel" style="margin-top:16px;margin-bottom:10px">${m.hf} ${m.home} ${m.score.h} × ${m.score.a} ${m.away} ${m.af}</div>
      <div class="bets-table" id="fin-bets-${m.id}"></div>`;
    });
  }else{
    h=`<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M20.2 7.8a9 9 0 0 1 0 8.4M3.8 7.8a9 9 0 0 0 0 8.4"/></svg>
      <p>Nenhum jogo ao vivo agora</p>
    </div>`;
  }

  $("p-live").innerHTML=`<div style="animation:up .2s ease both">${h}</div>`;
  if(live){fillBets("live-bets",live.id);loadAI()}
  fin.forEach(m=>fillBets(`fin-bets-${m.id}`,m.id));
}

function fillBets(elId,mid){
  const el=$(elId);if(!el)return;
  const m=MATCHES.find(x=>x.id===mid);
  const users=allUsers();let rows="";
  users.forEach(u=>{
    const g=(S.guesses[u]||{})[mid];if(!g)return;
    const p=pts(g,m);
    const tc=p===3?"rt-3":p===1?"rt-1":p===0?"rt-0":"rt-p";
    const tt=p===3?"+3":p===1?"+1":p===0?"0":"—";
    rows+=`<div class="bt-row">
      <div class="bt-av">${ini(u)}</div>
      <span class="bt-name">${u}</span>
      <span class="bt-score">${g.h} × ${g.a}</span>
      <span class="rtag ${tc}">${tt}</span>
    </div>`;
  });
  el.innerHTML=rows||`<div style="padding:14px;font-size:12px;color:var(--text-3)">Nenhum palpite registrado.</div>`;
}

async function loadAI(){
  const el=$("ai-text");if(!el)return;
  const m=MATCHES.find(x=>x.status==="live");if(!m)return;
  el.textContent="Analisando...";
  const desc=m.phase==="HT"?"no intervalo":m.phase==="FT"?"encerrado":`no ${m.minute}º minuto`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:100,
        messages:[{role:"user",content:`Comentarista de bolão brasileiro. ${m.home} ${m.score.h}×${m.score.a} ${m.away}, ${desc}. 2 frases animadas, sem emojis, em português.`}]})});
    const d=await r.json();
    el.textContent=d.content?.[0]?.text||"Jogo disputado!";
  }catch{el.textContent=`${m.home} ${m.score.h}×${m.score.a} ${m.away}, ${desc}.`}
}

// ── ADMIN ──────────────────────────────────────────────────────
function renderAdmin(){
  if(!S.isAdmin){$("p-admin").innerHTML=`<div class="empty-state"><p>Sem acesso admin.</p></div>`;return}
  let h=`<div class="slabel" style="margin-bottom:12px">Gerenciar resultados</div><div class="adm-card">`;
  MATCHES.forEach(m=>{
    h+=`<div class="adm-row">
      <span class="adm-lbl">${m.hf} ${m.home} × ${m.away} ${m.af}</span>
      <input class="a-in" id="ah${m.id}" type="number" min="0" max="20" value="${m.score.h??''}">
      <span class="a-sep">×</span>
      <input class="a-in" id="aa${m.id}" type="number" min="0" max="20" value="${m.score.a??''}">
      <select class="a-sel" id="as${m.id}">
        <option value="upcoming"${m.status==="upcoming"?" selected":""}>Próximo</option>
        <option value="live"${m.status==="live"?" selected":""}>Ao vivo</option>
        <option value="finished"${m.status==="finished"?" selected":""}>Encerrado</option>
      </select>
      <select class="a-sel" id="ap${m.id}">
        <option value="PRE"${m.phase==="PRE"?" selected":""}>Pré</option>
        <option value="1H"${m.phase==="1H"?" selected":""}>1T</option>
        <option value="HT"${m.phase==="HT"?" selected":""}>Int.</option>
        <option value="2H"${m.phase==="2H"?" selected":""}>2T</option>
        <option value="FT"${m.phase==="FT"?" selected":""}>FT</option>
      </select>
      <button class="a-save" onclick="admSave(${m.id})">Salvar</button>
    </div>`;
  });
  h+=`</div>`;
  $("p-admin").innerHTML=`<div style="animation:up .2s ease both">${h}</div>`;
}
function admSave(mid){
  const h=parseInt($("ah"+mid).value),a=parseInt($("aa"+mid).value);
  const m=MATCHES.find(x=>x.id===mid);
  if(!isNaN(h)&&!isNaN(a)){m.score.h=h;m.score.a=a}
  m.status=$("as"+mid).value; m.phase=$("ap"+mid).value;
  const pip=$("live-pip");
  if(pip)pip.style.display=MATCHES.some(x=>x.status==="live")?"block":"none";
  renderJogos();renderRanking();renderLive();renderAdmin();
  toast("Atualizado");
}

// ── TOAST ──────────────────────────────────────────────────────
let tT;
function toast(msg){
  const t=$("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(tT);tT=setTimeout(()=>t.classList.remove("show"),1800);
}
</script>
